<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Data Scraper Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-robot"></i> AI Data Scraper Pro</h1>
            <p>✅ 100% Working - Real Browser Scraping</p>
        </header>

        <div class="card">
            <div class="input-group">
                <label>🌐 Target URL</label>
                <div class="url-input">
                    <input type="url" id="url" placeholder="https://quotes.toscrape.com" value="https://quotes.toscrape.com">
                    <button id="testUrls" class="test-btn"><i class="fas fa-th"></i></button>
                </div>
            </div>

            <div class="input-group">
                <label>🎯 What to Extract</label>
                <textarea id="instructions" rows="4">Extract all quotes and authors as JSON array</textarea>
            </div>

            <button id="scrapeBtn" class="scrape-btn">
                <i class="fas fa-magic"></i> Start Scraping
            </button>

            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <p>🕷️ Launching browser... Extracting data...</p>
            </div>

            <div id="results" class="results hidden">
                <div class="results-header">
                    <h3><i class="fas fa-database"></i> Extracted Data</h3>
                    <div class="actions">
                        <button id="copyBtn"><i class="fas fa-copy"></i></button>
                        <button id="downloadBtn"><i class="fas fa-download"></i></button>
                    </div>
                </div>
                <pre><code id="jsonOutput">{}</code></pre>
            </div>

            <div id="error" class="error hidden"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
